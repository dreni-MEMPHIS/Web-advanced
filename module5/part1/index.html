<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>personal info:</legend>
    <label for="firstname">First name:</label><br>
    <input type="text" id="firstname" name="firstname" value="john" readonly><br><br>
    <label for="lastname">last name:</label><br>
    <input type="text" id="lastname" name="lastname" disabled><br><br>
    <label for="password">password:</label><br>
    <input type="password" id="password" name="password" placeholder="password"><br><br>
    <label for="email">email:</label><br>
    <input type="email" id="email" name="email" required><br><br>
    <label> Gender:</label><br>
    <label for="male">male:</label>
    <input type="radio" id="male" name="male"><br><br>
    <label for="female">female:</label>
    <input type="radio" id="female" name="female"><br><br>
    
     <label for="email">Hobby:</label><br>
     <label for="Gaming">Gaming:</label>
    <input type="checkbox" id="Gaming" name="Gaming"><br><br>
     <label for="football">football:</label>
    <input type="checkbox" id="football" name="football"><br><br>
     <label for="swimming">swimming:</label>
    <input type="checkbox" id="swimming" name="swimming"><br><br>
    <label for="pets">chose a pet:</label>
    <select id="pet" name="pet">
        <option value="dog">dog</option>
        <option value="cat">cat</option>
        <option value="kledis peshki">kledis peshki</option>
    </select><br><br>
    <textarea name="message" rows="10"  cols="20" maxlength="50"></textarea>
    <input type="submit" id="submit"  name="submit">
    </fieldset>
    </form>
</body>
</html>
